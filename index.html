<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Timer</title>
    <style>
        :root { --accent: #00e676; --bg: #121212; --card: #1e1e1e; --stop: #cf6679; --pause: #2196F3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        h2 { text-align: center; color: var(--accent); }
        
        .setup-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { background: #2c2c2c; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: 90%; margin-bottom: 10px; font-size: 1rem; }
        button { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .add-btn { background: var(--accent); color: #000; }
        .clear-btn { background: transparent; color: #ff5252; border: 1px solid #ff5252; margin-top: 20px; }

        .exercise-item { background: #2a2a2a; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--accent); }
        
        #active-workout { display: none; text-align: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .timer { font-size: 8rem; font-weight: 900; color: white; margin: 10px 0; }
        .label { font-size: 1.8rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }
        .action-btns { display: flex; gap: 10px; width: 85%; }
        .pause-btn { background: var(--pause); color: white; }
        .stop-btn { background: var(--stop); color: white; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h2>MI RUTINA</h2>
    
    <div class="setup-card">
        <input type="text" id="ex-name" placeholder="Nombre (ej: Sentadillas)">
        <input type="number" id="ex-sets" placeholder="Series">
        <input type="number" id="ex-work" placeholder="Tiempo Serie (seg)">
        <input type="number" id="ex-rest" placeholder="Descanso entre series (seg)">
        <input type="number" id="ex-gap" placeholder="Descanso entre ejercicios (seg)">
        <button class="add-btn" onclick="addExercise()">+ AÑADIR EJERCICIO</button>
    </div>

    <div id="exercise-list"></div>
    
    <button id="start-btn" style="display:none; background: white; color: black;" onclick="startWorkout()">INICIAR ENTRENAMIENTO</button>
    <button class="clear-btn" id="clear-btn" style="display:none;" onclick="clearRoutine()">BORRAR TODO</button>
</div>

<div id="active-workout">
    <div id="current-ex-name" style="font-size: 2.2rem; font-weight: bold;"></div>
    <div id="status-label" class="label">LISTO</div>
    <div class="timer" id="timer-display">00</div>
    <div id="current-set-info" style="color: #888; margin-bottom: 20px;"></div>
    
    <div class="action-btns">
        <button class="pause-btn" id="pause-resume-btn" onclick="togglePause()">PAUSAR</button>
        <button class="stop-btn" onclick="location.reload()">SALIR</button>
    </div>
</div>

<script>
    let exercises = JSON.parse(localStorage.getItem('myRoutine')) || [];
    let isPaused = false;
    let timeLeft = 0;

    // Cargar rutina al abrir
    window.onload = () => { if(exercises.length > 0) renderExercises(); };

    function addExercise() {
        const name = document.getElementById('ex-name').value;
        const sets = document.getElementById('ex-sets').value;
        const work = document.getElementById('ex-work').value;
        
        if(!name || !sets || !work) return alert("Completa los campos obligatorios");

        exercises.push({
            name: name,
            sets: parseInt(sets),
            work: parseInt(work),
            rest: parseInt(document.getElementById('ex-rest').value || 0),
            gap: parseInt(document.getElementById('ex-gap').value || 0)
        });
        
        saveAndRender();
        document.getElementById('ex-name').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('myRoutine', JSON.stringify(exercises));
        renderExercises();
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = exercises.map((e, i) => `
            <div class="exercise-item">
                <span><strong>${e.name}</strong> (${e.sets} series)</span>
                <button onclick="removeEx(${i})" style="width: auto; background: none; color: #ff5252; margin: 0; padding: 5px;">✕</button>
            </div>
        `).join('');
        
        const hasItems = exercises.length > 0;
        document.getElementById('start-btn').style.display = hasItems ? 'block' : 'none';
        document.getElementById('clear-btn').style.display = hasItems ? 'block' : 'none';
    }

    function removeEx(index) {
        exercises.splice(index, 1);
        saveAndRender();
    }

    function clearRoutine() {
        if(confirm("¿Seguro que quieres borrar toda la rutina?")) {
            exercises = [];
            saveAndRender();
        }
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        window.speechSynthesis.speak(utterance);
    }

    function togglePause() {
        isPaused = !isPaused;
        const btn = document.getElementById('pause-resume-btn');
        btn.innerText = isPaused ? "REANUDAR" : "PAUSAR";
        btn.style.background = isPaused ? "#4CAF50" : "#2196F3";
    }

    async function startWorkout() {
        document.getElementById('active-workout').style.display = 'flex';
        for (let i = 0; i < exercises.length; i++) {
            let ex = exercises[i];
            speak(ex.name);
            for (let s = 1; s <= ex.sets; s++) {
                await runTimer(ex.work, "TRABAJO", ex.name, `Serie ${s} de ${ex.sets}`, "#00e676");
                if (s < ex.sets) {
                    await runTimer(ex.rest, "DESCANSO", "Recupera", `Próxima serie en...`, "#ffb300");
                } else if (i < exercises.length - 1) {
                    await runTimer(ex.gap, "CAMBIO", "Prepárate", `Siguiente: ${exercises[i+1].name}`, "#2196F3");
                }
            }
        }
        speak("Entrenamiento completado");
        location.reload();
    }

    function runTimer(seconds, status, name, subtext, color) {
        return new Promise(resolve => {
            timeLeft = seconds;
            document.getElementById('status-label').innerText = status;
            document.getElementById('status-label').style.color = color;
            document.getElementById('current-ex-name').innerText = name;
            document.getElementById('current-set-info').innerText = subtext;

            const interval = setInterval(() => {
                if (!isPaused) {
                    document.getElementById('timer-display').innerText = timeLeft;
                    if (timeLeft <= 3 && timeLeft > 0) beep(440);
                    if (timeLeft <= 0) {
                        clearInterval(interval);
                        beep(880);
                        resolve();
                    }
                    timeLeft--;
                }
            }, 1000);
        });
    }

    function beep(freq) {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = freq;
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.5);
    }
</script>
</body>
</html>
