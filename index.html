<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Minimalist Workout</title>
    <style>
        :root { --accent: #00e676; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        h2 { text-align: center; color: var(--accent); margin-bottom: 30px; letter-spacing: 2px; }
        
        .field-group { margin-bottom: 25px; text-align: center; }
        .field-label { display: block; font-size: 0.85rem; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        
        /* Estilo de los inputs */
        input[type="text"] { 
            background: none; border: none; border-bottom: 2px solid #333; color: white; 
            font-size: 1.2rem; text-align: center; width: 80%; padding: 5px; outline: none;
        }
        input[type="text"]:focus { border-bottom-color: var(--accent); }
        
        input[type="number"] { 
            background: #222; border: 1px solid #444; color: white; font-size: 1.5rem; 
            text-align: center; width: 60px; border-radius: 8px; padding: 5px; 
        }

        /* Estilo del selector 00:00 */
        .time-selector { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 1.5rem; }
        .time-selector select { 
            background: #222; border: 1px solid #444; color: white; font-size: 1.5rem; 
            padding: 5px 10px; border-radius: 8px; appearance: none; text-align: center;
        }

        .add-btn { background: var(--accent); color: black; border: none; padding: 15px; border-radius: 50px; font-weight: bold; width: 100%; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        
        .exercise-item { background: var(--card); padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; }
        
        /* Pantalla Activa */
        #active-workout { display: none; text-align: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; justify-content: center; }
        .timer-big { font-size: 8rem; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h2>MI RUTINA</h2>
    
    <div class="field-group">
        <span class="field-label">Nombre del Ejercicio</span>
        <input type="text" id="ex-name" placeholder="Ej: Flexiones">
    </div>

    <div class="field-group">
        <span class="field-label">Series</span>
        <input type="number" id="ex-sets" value="3" min="1">
    </div>

    <div class="field-group">
        <span class="field-label">Tiempo de Serie</span>
        <div class="time-selector">
            <select id="work-m"></select> : <select id="work-s"></select>
        </div>
    </div>

    <div class="field-group">
        <span class="field-label">Descanso entre Series</span>
        <div class="time-selector">
            <select id="rest-m"></select> : <select id="rest-s"></select>
        </div>
    </div>

    <div class="field-group">
        <span class="field-label">Descanso entre Ejercicios</span>
        <div class="time-selector">
            <select id="gap-m"></select> : <select id="gap-s"></select>
        </div>
    </div>

    <button class="add-btn" onclick="addExercise()">+ AÑADIR EJERCICIO</button>

    <div id="exercise-list" style="margin-top: 30px;"></div>
    <button id="start-btn" style="display:none; background: white; color: black; margin-top: 20px; border-radius: 50px; padding: 15px; font-weight: bold; border: none; width: 100%;" onclick="startWorkout()">COMENZAR RUTINA</button>
</div>

<div id="active-workout">
    <div id="current-ex-name" style="font-size: 2rem; color: var(--accent);"></div>
    <div id="status-label" style="font-size: 1.2rem; margin-top: 10px;">TRABAJO</div>
    <div class="timer-big" id="timer-display">00:00</div>
    <div id="current-set-info" style="color: #666;"></div>
    <button onclick="location.reload()" style="background: #ff5252; color: white; border: none; padding: 10px 30px; border-radius: 50px; margin-top: 30px;">DETENER</button>
</div>

<script>
    let exercises = JSON.parse(localStorage.getItem('myRoutine')) || [];

    function populate() {
        const ids = ['work-m', 'work-s', 'rest-m', 'rest-s', 'gap-m', 'gap-s'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            for(let i=0; i<60; i++) {
                let o = document.createElement('option');
                o.value = i; o.text = i.toString().padStart(2, '0');
                el.add(o);
            }
        });
        document.getElementById('work-s').value = 30; // Default 30 seg
    }

    window.onload = () => { 
        populate(); 
        render(); 
    };

    function addExercise() {
        const name = document.getElementById('ex-name').value || "Ejercicio";
        const sets = parseInt(document.getElementById('ex-sets').value);
        const work = (parseInt(document.getElementById('work-m').value)*60) + parseInt(document.getElementById('work-s').value);
        const rest = (parseInt(document.getElementById('rest-m').value)*60) + parseInt(document.getElementById('rest-s').value);
        const gap = (parseInt(document.getElementById('gap-m').value)*60) + parseInt(document.getElementById('gap-s').value);

        exercises.push({name, sets, work, rest, gap});
        localStorage.setItem('myRoutine', JSON.stringify(exercises));
        render();
        document.getElementById('ex-name').value = '';
    }

    function render() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = exercises.map((e, i) => `
            <div class="exercise-item">
                <span><b>${e.name}</b> (${e.sets} series)</span>
                <span onclick="remove(${i})" style="color: #ff5252; font-weight: bold; cursor: pointer;">ELIMINAR</span>
            </div>
        `).join('');
        document.getElementById('start-btn').style.display = exercises.length > 0 ? 'block' : 'none';
    }

    function remove(i) { exercises.splice(i, 1); localStorage.setItem('myRoutine', JSON.stringify(exercises)); render(); }

    function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'es-ES'; window.speechSynthesis.speak(u); }

    async function startWorkout() {
        document.getElementById('active-workout').style.display = 'flex';
        for (let i = 0; i < exercises.length; i++) {
            let ex = exercises[i];
            speak(ex.name);
            for (let s = 1; s <= ex.sets; s++) {
                await runTimer(ex.work, "TRABAJO", ex.name, `Serie ${s} de ${ex.sets}`, "#00e676");
                if (s < ex.sets) await runTimer(ex.rest, "DESCANSO", "Recupera", "Próxima serie...", "#ffb300");
                else if (i < exercises.length - 1) await runTimer(ex.gap, "CAMBIO", "Prepárate", `Siguiente: ${exercises[i+1].name}`, "#2196F3");
            }
        }
        speak("Terminado");
        location.reload();
    }

    function runTimer(sec, status, name, sub, color) {
        return new Promise(resolve => {
            let left = sec;
            const disp = document.getElementById('timer-display');
            document.getElementById('status-label').innerText = status;
            document.getElementById('status-label').style.color = color;
            document.getElementById('current-ex-name').innerText = name;
            document.getElementById('current-set-info').innerText = sub;

            const timer = setInterval(() => {
                const m = Math.floor(left / 60);
                const s = left % 60;
                disp.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (left <= 0) { clearInterval(timer); resolve(); }
                left--;
            }, 1000);
        });
    }
</script>
</body>
</html>
