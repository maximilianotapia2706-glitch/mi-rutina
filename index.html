<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Workout Pro Timer</title>
    <style>
        :root { --accent: #00e676; --bg: #121212; --card: #1e1e1e; --stop: #cf6679; --pause: #2196F3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        h2 { text-align: center; color: var(--accent); letter-spacing: 1px; }
        
        .setup-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        label { font-size: 0.9rem; color: #aaa; flex: 1; }
        
        input[type="text"], input[type="number"], select { 
            background: #2c2c2c; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; font-size: 1rem; 
        }
        .time-picker { display: flex; gap: 5px; flex: 1.5; justify-content: flex-end; }
        .time-picker select { width: 65px; text-align: center; }

        button { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .add-btn { background: var(--accent); color: #000; font-size: 1.1rem; }

        .exercise-item { background: #2a2a2a; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; border-left: 5px solid var(--accent); }
        
        #active-workout { display: none; text-align: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .timer { font-size: 7rem; font-weight: 900; color: white; margin: 5px 0; font-variant-numeric: tabular-nums; }
        .label { font-size: 1.8rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }
        .action-btns { display: flex; gap: 10px; width: 85%; }
        .pause-btn { background: var(--pause); color: white; }
        .stop-btn { background: var(--stop); color: white; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h2>MI RUTINA</h2>
    
    <div class="setup-card">
        <input type="text" id="ex-name" placeholder="Nombre: Sentadillas" style="width: 94%; margin-bottom: 20px;">
        
        <div class="row">
            <label>Series:</label>
            <input type="number" id="ex-sets" value="1" min="1" style="width: 50px; text-align: center;">
        </div>

        <div class="row">
            <label>Tiempo Serie:</label>
            <div class="time-picker">
                <select id="work-m"></select><span>:</span><select id="work-s"></select>
            </div>
        </div>

        <div class="row">
            <label>Descanso (Serie):</label>
            <div class="time-picker">
                <select id="rest-m"></select><span>:</span><select id="rest-s"></select>
            </div>
        </div>

        <div class="row">
            <label>Descanso (Ejer.):</label>
            <div class="time-picker">
                <select id="gap-m"></select><span>:</span><select id="gap-s"></select>
            </div>
        </div>

        <button class="add-btn" onclick="addExercise()">+ AÑADIR EJERCICIO</button>
    </div>

    <div id="exercise-list"></div>
    <button id="start-btn" style="display:none; background: white; color: black;" onclick="startWorkout()">INICIAR ENTRENAMIENTO</button>
    <button id="clear-btn" style="display:none; background: transparent; color: #ff5252; border: 1px solid #ff5252;" onclick="clearRoutine()">BORRAR TODO</button>
</div>

<div id="active-workout">
    <div id="current-ex-name" style="font-size: 2.2rem; font-weight: bold;"></div>
    <div id="status-label" class="label">LISTO</div>
    <div class="timer" id="timer-display">00:00</div>
    <div id="current-set-info" style="color: #888; margin-bottom: 20px;"></div>
    
    <div class="action-btns">
        <button class="pause-btn" id="pause-resume-btn" onclick="togglePause()">PAUSAR</button>
        <button class="stop-btn" onclick="location.reload()">SALIR</button>
    </div>
</div>

<script>
    let exercises = JSON.parse(localStorage.getItem('myRoutine')) || [];
    let isPaused = false;
    let timeLeft = 0;

    // Llenar los selectores de tiempo (0-59)
    function populateSelects() {
        const selects = ['work-m', 'work-s', 'rest-m', 'rest-s', 'gap-m', 'gap-s'];
        selects.forEach(id => {
            const s = document.getElementById(id);
            for(let i=0; i<60; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = i.toString().padStart(2, '0');
                s.appendChild(opt);
            }
        });
        // Valores por defecto lógicos
        document.getElementById('work-s').value = 30;
        document.getElementById('rest-s').value = 15;
    }

    window.onload = () => { 
        populateSelects();
        if(exercises.length > 0) renderExercises(); 
    };

    function addExercise() {
        const name = document.getElementById('ex-name').value || "Ejercicio";
        const sets = parseInt(document.getElementById('ex-sets').value);
        
        // Convertir todo a segundos para la lógica interna
        const work = (parseInt(document.getElementById('work-m').value) * 60) + parseInt(document.getElementById('work-s').value);
        const rest = (parseInt(document.getElementById('rest-m').value) * 60) + parseInt(document.getElementById('rest-s').value);
        const gap = (parseInt(document.getElementById('gap-m').value) * 60) + parseInt(document.getElementById('gap-s').value);

        exercises.push({ name, sets, work, rest, gap });
        saveAndRender();
        document.getElementById('ex-name').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('myRoutine', JSON.stringify(exercises));
        renderExercises();
    }

    function renderExercises() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = exercises.map((e, i) => `
            <div class="exercise-item">
                <span><strong>${e.name}</strong> (${e.sets} series)</span>
                <button onclick="removeEx(${i})" style="width: auto; background: none; color: #ff5252; margin: 0;">✕</button>
            </div>
        `).join('');
        const hasItems = exercises.length > 0;
        document.getElementById('start-btn').style.display = hasItems ? 'block' : 'none';
        document.getElementById('clear-btn').style.display = hasItems ? 'block' : 'none';
    }

    function removeEx(i) { exercises.splice(i, 1); saveAndRender(); }
    function clearRoutine() { if(confirm("¿Borrar rutina?")) { exercises = []; saveAndRender(); } }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        window.speechSynthesis.speak(utterance);
    }

    function togglePause() {
        isPaused = !isPaused;
        const btn = document.getElementById('pause-resume-btn');
        btn.innerText = isPaused ? "REANUDAR" : "PAUSAR";
        btn.style.background = isPaused ? "#4CAF50" : "#2196F3";
    }

    async function startWorkout() {
        document.getElementById('active-workout').style.display = 'flex';
        for (let i = 0; i < exercises.length; i++) {
            let ex = exercises[i];
            speak(ex.name);
            for (let s = 1; s <= ex.sets; s++) {
                await runTimer(ex.work, "TRABAJO", ex.name, `Serie ${s} de ${ex.sets}`, "#00e676");
                if (s < ex.sets) {
                    await runTimer(ex.rest, "DESCANSO", "Recupera", `Próxima serie en...`, "#ffb300");
                } else if (i < exercises.length - 1) {
                    await runTimer(ex.gap, "CAMBIO", "Prepárate", `Siguiente: ${exercises[i+1].name}`, "#2196F3");
                }
            }
        }
        speak("Entrenamiento terminado");
        location.reload();
    }

    function runTimer(seconds, status, name, subtext, color) {
        return new Promise(resolve => {
            timeLeft = seconds;
            document.getElementById('status-label').innerText = status;
            document.getElementById('status-label').style.color = color;
            document.getElementById('current-ex-name').innerText = name;
            document.getElementById('current-set-info').innerText = subtext;

            const interval = setInterval(() => {
                if (!isPaused) {
                    document.getElementById('timer-display').innerText = formatTime(timeLeft);
                    if (timeLeft <= 3 && timeLeft > 0) beep(440);
                    if (timeLeft <= 0) {
                        clearInterval(interval);
                        beep(880);
                        resolve();
                    }
                    timeLeft--;
                }
            }, 1000);
        });
    }

    function beep(freq) {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = freq;
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.5);
    }
</script>
</body>
</html>
